# /rabbitmq/rabbitmq.conf
# Disable the default guest account entirely
# (it is also overridden by RABBITMQ_DEFAULT_USER but this makes it explicit)
default_user = CHANGE_ME_IN_ENV
default_pass = CHANGE_ME_IN_ENV

# Load queue/exchange/user definitions from the file below on first boot
management.load_definitions = /etc/rabbitmq/definitions.json

# Limit how many channels a single connection can open (DoS protection)
channel_max = 128

# Close connections that have been idle for 10 minutes
heartbeat = 600

# Only accept AMQP connections (no STOMP, MQTT, etc. unless you need them)
# Uncomment to restrict to AMQP only if you don't use other protocols
# listeners.tcp.default = 5672

# Logging — reduce noise in production
log.console = true
log.console.level = warning