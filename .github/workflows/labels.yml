name: Sync labels

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: https://raw.githubusercontent.com/Architecture-Studio-IT/.github/main/labels.yml
          delete-other-labels: true
          token: ${{ secrets.GITHUB_TOKEN }}
